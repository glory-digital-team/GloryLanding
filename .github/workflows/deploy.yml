name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "GLORY.md"
  workflow_dispatch:

concurrency:
  group: deploy-glory-landing
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/glory-digital-team/glorylanding

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to k3s over SSH
        env:
          IMAGE: ghcr.io/glory-digital-team/glorylanding:sha-${{ github.sha }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes ${SSH_USER}@${SSH_HOST}"
          # Render manifests with the immutable image tag and apply on the cluster.
          for f in k8s/namespace.yaml k8s/deployment.yaml k8s/service.yaml k8s/ingress.yaml; do
            sed "s|__IMAGE__|${IMAGE}|g" "$f"
            echo "---"
          done | $SSH "k3s kubectl apply -f -"
          $SSH "k3s kubectl -n glory-landing rollout status deploy/glory-landing --timeout=180s"
