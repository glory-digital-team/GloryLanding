apiVersion: apps/v1
kind: Deployment
metadata:
  name: glory-landing
  namespace: glory-landing
  labels:
    app: glory-landing
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Поднять новый под прежде чем убить старый → деплой без простоя даже на 1 реплике.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: glory-landing
  template:
    metadata:
      labels:
        app: glory-landing
    spec:
      containers:
        - name: glory-landing
          image: __IMAGE__
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 320Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
